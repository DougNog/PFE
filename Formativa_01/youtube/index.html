<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamTube</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo" onclick="showHome()">
      <div class="logo-icon"></div>
      StreamTube
    </div>

    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="Buscar vídeos..." onkeydown="if(event.key==='Enter') doSearch()">
      <button class="search-btn" onclick="doSearch()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
    </div>

    <div class="header-right">
      <button class="icon-btn" title="Notificações">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </button>
      <div class="avatar">JD</div>
    </div>
  </header>

  <!-- LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR -->
    <aside>
      <nav class="nav-section">
        <a class="nav-item active" onclick="showHome()">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9,22 9,12 15,12 15,22" fill="none" stroke="currentColor" stroke-width="2"/>
          </svg>
          Início
        </a>
        <a class="nav-item" id="nav-shorts" onclick="showShorts()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 2H9a1 1 0 0 0-1 1v18a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1z"/>
            <path d="m10 9 5 3-5 3V9z" fill="currentColor" stroke="none"/>
          </svg>
          Shorts
        </a>
        <a class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
          </svg>
          Inscrições
        </a>
      </nav>

      <div class="nav-divider"></div>

      <div class="nav-section">
        <div class="nav-section-title">Você</div>
        <a class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="23 7 16 12 23 17 23 7"/>
            <rect x="1" y="5" width="15" height="14" rx="2"/>
          </svg>
          Sua lista
        </a>
        <a class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12,6 12,12 16,14"/>
          </svg>
          Histórico
        </a>
        <a class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          Comentários
        </a>
      </div>

      <div class="nav-divider"></div>

      <div class="nav-section">
        <div class="nav-section-title">Explorar</div>
        <a class="nav-item" onclick="showCategory('Tecnologia')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          Tecnologia
        </a>
        <a class="nav-item" onclick="showCategory('Música')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
          </svg>
          Música
        </a>
        <a class="nav-item" onclick="showCategory('Jogos')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="6" y1="12" x2="10" y2="12"/>
            <line x1="8" y1="10" x2="8" y2="14"/>
            <line x1="15" y1="13" x2="15.01" y2="13"/>
            <line x1="18" y1="11" x2="18.01" y2="11"/>
            <rect x="2" y="6" width="20" height="12" rx="2"/>
          </svg>
          Jogos
        </a>
        <a class="nav-item" onclick="showCategory('Esportes')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="m4.93 4.93 4.24 4.24"/>
            <path d="m14.83 9.17 4.24-4.24"/>
            <path d="m14.83 14.83 4.24 4.24"/>
            <path d="m9.17 14.83-4.24 4.24"/>
            <circle cx="12" cy="12" r="4"/>
          </svg>
          Esportes
        </a>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main>

      <!-- SHORTS VIEW -->
      <div id="shorts-view">
        <div class="shorts-header">
          <div class="shorts-header-icon"></div>
          <h2>Shorts</h2>
        </div>
        <div class="shorts-container" id="shorts-container"></div>
      </div>

      <!-- HOME VIEW -->
      <div id="home-view">
        <div class="chips" id="chips-row"></div>
        <div class="video-grid" id="video-grid"></div>
      </div>

      <!-- PLAYER VIEW -->
      <div id="player-view">
        <button class="back-btn" onclick="showHome()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="m15 18-6-6 6-6"/>
          </svg>
          Voltar
        </button>

        <div class="player-layout">
          <!-- Left: player + info -->
          <div class="player-main">
            <div class="player-embed" id="player-embed"></div>
            <h1 class="player-title" id="player-title"></h1>

            <div class="player-meta-row">
              <div class="channel-info">
                <div class="channel-avatar" id="player-ch-avatar"
                     style="width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:white;"></div>
                <div>
                  <div class="channel-name-big" id="player-ch-name"></div>
                  <div class="channel-subs" id="player-ch-subs"></div>
                </div>
                <button class="sub-btn" id="sub-btn" onclick="toggleSub()">Inscrever-se</button>
              </div>

              <div class="action-btns">
                <button class="action-btn" onclick="this.style.color='var(--accent)'">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/>
                    <path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/>
                  </svg>
                  <span id="like-count">Curtir</span>
                </button>
                <button class="action-btn">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
                    <polyline points="16 6 12 2 8 6"/>
                    <line x1="12" y1="2" x2="12" y2="15"/>
                  </svg>
                  Compartilhar
                </button>
                <button class="action-btn">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="1"/>
                    <circle cx="19" cy="12" r="1"/>
                    <circle cx="5" cy="12" r="1"/>
                  </svg>
                </button>
              </div>
            </div>

            <div class="description-box" onclick="toggleDesc()">
              <div class="desc-views" id="desc-views"></div>
              <div class="desc-text" id="desc-text"></div>
            </div>

            <div class="comments-section">
              <div class="comments-title" id="comments-title"></div>
              <div id="comments-list"></div>
            </div>
          </div>

          <!-- Right: up next -->
          <div>
            <div class="up-next-title">Próximo</div>
            <div id="up-next-list"></div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
